# 机械工程 AI 系统：API + Postgres + Redis + 静态前端（Nginx）
# 使用：在「本目录」执行  docker compose up -d --build
# 访问：API http://127.0.0.1:8010/docs   前端 http://127.0.0.1:8080/Unified%20Application%20Hub.html

name: mechanical-ai-quanzhenghe

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mech_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-mechanical_ai}
    volumes:
      - quanzhenghe_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mech} -d ${POSTGRES_DB:-mechanical_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8010}:8010"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-mech}:${POSTGRES_PASSWORD:-mech_secret_change_me}@postgres:5432/${POSTGRES_DB:-mechanical_ai}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-docker-dev-change-use-openssl-rand-hex-32}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./前端:/usr/share/nginx/html:ro
      - ./docker/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  quanzhenghe_pgdata:
